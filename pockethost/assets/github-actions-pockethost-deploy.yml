# Zero-build default:
# most small sites should only edit pb_public/index.html and pb_public/assets/site.css.
# Leave this workflow unchanged unless you need a different hosting model.
name: Deploy to Pockethost via FTP

on:
  push:
    branches:
      - main
      - master
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pockethost-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    env:
      POCKETHOST_ENVIRONMENT: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
      POCKETHOST_TENANT_ID: ${{ vars.POCKETHOST_TENANT_ID != '' && vars.POCKETHOST_TENANT_ID || secrets.POCKETHOST_TENANT_ID }}
      HEALTHCHECK_BASE_URL: ${{ vars.HEALTHCHECK_BASE_URL }}

    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect repository contract
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          makefile=""
          for candidate in GNUmakefile makefile Makefile; do
            if [ -f "$candidate" ]; then
              makefile="$candidate"
              break
            fi
          done

          echo "makefile=${makefile}" >> "$GITHUB_OUTPUT"

          if [ -n "$makefile" ]; then
            targets="$(
              awk -F: '
                /^[A-Za-z0-9_.-]+:[^=]?/ {
                  print $1
                }
              ' "$makefile" | sort -u
            )"

            echo "has_makefile=true" >> "$GITHUB_OUTPUT"

            for target in install lint test build health; do
              if printf '%s\n' "$targets" | grep -qx "$target"; then
                echo "has_${target}=true" >> "$GITHUB_OUTPUT"
              else
                echo "has_${target}=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "has_makefile=false" >> "$GITHUB_OUTPUT"
            echo "has_install=false" >> "$GITHUB_OUTPUT"
            echo "has_lint=false" >> "$GITHUB_OUTPUT"
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "has_build=false" >> "$GITHUB_OUTPUT"
            echo "has_health=false" >> "$GITHUB_OUTPUT"
          fi

          for directory in pb_hooks pb_migrations pb_public; do
            if [ -d "$directory" ]; then
              echo "has_${directory}=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_${directory}=false" >> "$GITHUB_OUTPUT"
            fi
          done

          previous_sha="${{ github.event.before }}"
          if [ -n "$previous_sha" ] && [ "$previous_sha" != "0000000000000000000000000000000000000000" ]; then
            echo "has_previous_sha=true" >> "$GITHUB_OUTPUT"
            echo "previous_sha=${previous_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "has_previous_sha=false" >> "$GITHUB_OUTPUT"
            echo "previous_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GitHub Environment configuration
        shell: bash
        env:
          POCKETHOST_FTP_USERNAME_CONFIG: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          POCKETHOST_FTP_PASSWORD_CONFIG: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
        run: |
          set -euo pipefail

          missing=""

          if [ "${{ steps.detect.outputs.has_pb_hooks }}" = "true" ] || [ "${{ steps.detect.outputs.has_pb_migrations }}" = "true" ] || [ "${{ steps.detect.outputs.has_pb_public }}" = "true" ]; then
            if [ -z "${POCKETHOST_FTP_USERNAME_CONFIG:-}" ]; then
              missing="${missing}\n- POCKETHOST_FTP_USERNAME (Environment secret)"
            fi

            if [ -z "${POCKETHOST_FTP_PASSWORD_CONFIG:-}" ]; then
              missing="${missing}\n- POCKETHOST_FTP_PASSWORD (Environment secret)"
            fi
          fi

          if [ "${{ steps.detect.outputs.has_pb_hooks }}" = "true" ] || [ "${{ steps.detect.outputs.has_pb_migrations }}" = "true" ]; then
            if [ -z "${POCKETHOST_TENANT_ID:-}" ]; then
              missing="${missing}\n- POCKETHOST_TENANT_ID (Environment variable or secret)"
            fi
          fi

          if [ "${{ steps.detect.outputs.has_health }}" = "true" ] && [ -z "${HEALTHCHECK_BASE_URL:-}" ] && [ -z "${POCKETHOST_TENANT_ID:-}" ]; then
            missing="${missing}\n- POCKETHOST_TENANT_ID or HEALTHCHECK_BASE_URL for make health"
          fi

          if [ -n "$missing" ]; then
            echo "Missing GitHub Environment configuration for '${POCKETHOST_ENVIRONMENT}'." >&2
            printf '%b\n' "$missing" >&2
            exit 1
          fi

      - name: Enforce Makefile CI contract
        if: steps.detect.outputs.has_makefile == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.detect.outputs.has_lint }}" != "true" ]; then
            echo "Missing required make target: lint" >&2
            exit 1
          fi

          if [ "${{ steps.detect.outputs.has_test }}" != "true" ]; then
            echo "Missing required make target: test" >&2
            exit 1
          fi

          if [ "${{ steps.detect.outputs.has_build }}" != "true" ]; then
            echo "Missing required make target: build" >&2
            exit 1
          fi

      - name: Run make install
        if: steps.detect.outputs.has_install == 'true'
        run: make install

      - name: Run make lint
        if: steps.detect.outputs.has_makefile == 'true'
        run: make lint

      - name: Run make test
        if: steps.detect.outputs.has_makefile == 'true'
        run: make test

      - name: Run make build
        if: steps.detect.outputs.has_makefile == 'true'
        run: make build

      - name: Validate tenant-scoped FTP configuration
        if: steps.detect.outputs.has_pb_hooks == 'true' || steps.detect.outputs.has_pb_migrations == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${POCKETHOST_TENANT_ID:-}" ]; then
            echo "POCKETHOST_TENANT_ID is required when deploying pb_hooks or pb_migrations." >&2
            exit 1
          fi

      - name: Resolve pb_public FTP directory
        id: resolve_pb_public
        if: steps.detect.outputs.has_pb_public == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${POCKETHOST_TENANT_ID:-}" ]; then
            echo "server_dir=${POCKETHOST_TENANT_ID}/pb_public/" >> "$GITHUB_OUTPUT"
            echo "mode=tenant" >> "$GITHUB_OUTPUT"
            echo "Resolved pb_public FTP directory: ${POCKETHOST_TENANT_ID}/pb_public/"
          else
            echo "server_dir=pb_public/" >> "$GITHUB_OUTPUT"
            echo "mode=root" >> "$GITHUB_OUTPUT"
            echo "Resolved pb_public FTP directory: pb_public/"
          fi

      - name: Deploy pb_hooks via FTP
        if: steps.detect.outputs.has_pb_hooks == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_hooks/
          server-dir: ${{ env.POCKETHOST_TENANT_ID }}/pb_hooks/
          state-name: .ftp-deploy-state-pb_hooks-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Deploy pb_migrations via FTP
        if: steps.detect.outputs.has_pb_migrations == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_migrations/
          server-dir: ${{ env.POCKETHOST_TENANT_ID }}/pb_migrations/
          state-name: .ftp-deploy-state-pb_migrations-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Deploy pb_public via FTP
        if: steps.detect.outputs.has_pb_public == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_public/
          server-dir: ${{ steps.resolve_pb_public.outputs.server_dir }}
          state-name: .ftp-deploy-state-pb_public-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Wait for deployment to settle
        run: sleep 5

      - name: Run health check
        id: health
        if: steps.detect.outputs.has_health == 'true'
        continue-on-error: true
        run: make health

      - name: Checkout previous commit for rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.detect.outputs.previous_sha }}"

      - name: Detect rollback repository contract
        id: rollback_detect
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        run: |
          set -euo pipefail

          makefile=""
          for candidate in GNUmakefile makefile Makefile; do
            if [ -f "$candidate" ]; then
              makefile="$candidate"
              break
            fi
          done

          echo "makefile=${makefile}" >> "$GITHUB_OUTPUT"

          if [ -n "$makefile" ]; then
            targets="$(
              awk -F: '
                /^[A-Za-z0-9_.-]+:[^=]?/ {
                  print $1
                }
              ' "$makefile" | sort -u
            )"

            echo "has_makefile=true" >> "$GITHUB_OUTPUT"

            for target in install build; do
              if printf '%s\n' "$targets" | grep -qx "$target"; then
                echo "has_${target}=true" >> "$GITHUB_OUTPUT"
              else
                echo "has_${target}=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "has_makefile=false" >> "$GITHUB_OUTPUT"
            echo "has_install=false" >> "$GITHUB_OUTPUT"
            echo "has_build=false" >> "$GITHUB_OUTPUT"
          fi

          for directory in pb_hooks pb_migrations pb_public; do
            if [ -d "$directory" ]; then
              echo "has_${directory}=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_${directory}=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Reinstall previous commit before rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_install == 'true'
        run: make install

      - name: Rebuild previous commit before rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_makefile == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.rollback_detect.outputs.has_build }}" != "true" ]; then
            echo "Rollback requires a build target when a makefile is present." >&2
            exit 1
          fi

          make build

      - name: Rollback pb_hooks via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_hooks == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_hooks/
          server-dir: ${{ env.POCKETHOST_TENANT_ID }}/pb_hooks/
          state-name: .ftp-deploy-state-pb_hooks-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Rollback pb_migrations via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_migrations == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_migrations/
          server-dir: ${{ env.POCKETHOST_TENANT_ID }}/pb_migrations/
          state-name: .ftp-deploy-state-pb_migrations-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Rollback pb_public via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_public == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ./pb_public/
          server-dir: ${{ steps.resolve_pb_public.outputs.server_dir }}
          state-name: .ftp-deploy-state-pb_public-${{ github.ref_name }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Fail when rollback was not possible
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha != 'true'
        shell: bash
        run: |
          echo "Health check failed, but no previous commit SHA is available for rollback." >&2
          exit 1

      - name: Mark deployment as failed after rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        run: |
          echo "Health check failed. Previous commit was redeployed." >&2
          exit 1

      - name: Deployment complete
        if: steps.health.outcome != 'failure'
        run: |
          echo "Deployment completed successfully."
          echo "Instance: https://${POCKETHOST_TENANT_ID}.pockethost.io"
