name: Reusable Pockethost Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        description: Project root relative to the caller repository.
        required: false
        type: string
        default: .

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.plan.outputs.branch_name }}
      environment: ${{ steps.plan.outputs.environment }}
    steps:
      - name: Resolve default branch-to-environment mapping
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${GITHUB_REF_NAME}"

          case "$branch_name" in
            main|master)
              environment_name="production"
              ;;
            staging)
              environment_name="staging"
              ;;
            *)
              echo "Unsupported branch for the default Pockethost deployment convention: $branch_name" >&2
              echo "Use main or master for production, and staging for staging." >&2
              exit 1
              ;;
          esac

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "environment=$environment_name" >> "$GITHUB_OUTPUT"

  deploy:
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ needs.plan.outputs.environment }}

    concurrency:
      group: pockethost-deploy-${{ needs.plan.outputs.branch_name }}-${{ inputs.working-directory }}
      cancel-in-progress: true

    env:
      POCKETHOST_WORKDIR: ${{ inputs.working-directory }}
      POCKETHOST_TENANT_ID: ${{ secrets.POCKETHOST_TENANT_ID }}

    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate working directory
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "$POCKETHOST_WORKDIR" ]; then
            echo "Working directory does not exist: $POCKETHOST_WORKDIR" >&2
            exit 1
          fi

      - name: Detect repository contract
        id: detect
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail

          makefile=""
          for candidate in GNUmakefile makefile Makefile; do
            if [ -f "$candidate" ]; then
              makefile="$candidate"
              break
            fi
          done

          echo "makefile=${makefile}" >> "$GITHUB_OUTPUT"

          if [ -n "$makefile" ]; then
            targets="$(
              awk -F: '
                /^[A-Za-z0-9_.-]+:[^=]?/ {
                  print $1
                }
              ' "$makefile" | sort -u
            )"

            echo "has_makefile=true" >> "$GITHUB_OUTPUT"

            for target in install lint test build health; do
              if printf '%s\n' "$targets" | grep -qx "$target"; then
                echo "has_${target}=true" >> "$GITHUB_OUTPUT"
              else
                echo "has_${target}=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "has_makefile=false" >> "$GITHUB_OUTPUT"
            echo "has_install=false" >> "$GITHUB_OUTPUT"
            echo "has_lint=false" >> "$GITHUB_OUTPUT"
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "has_build=false" >> "$GITHUB_OUTPUT"
            echo "has_health=false" >> "$GITHUB_OUTPUT"
          fi

          for directory in pb_hooks pb_migrations pb_public; do
            if [ -d "$directory" ]; then
              echo "has_${directory}=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_${directory}=false" >> "$GITHUB_OUTPUT"
            fi
          done

          previous_sha="${{ github.event.before }}"
          if [ -n "$previous_sha" ] && [ "$previous_sha" != "0000000000000000000000000000000000000000" ]; then
            echo "has_previous_sha=true" >> "$GITHUB_OUTPUT"
            echo "previous_sha=${previous_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "has_previous_sha=false" >> "$GITHUB_OUTPUT"
            echo "previous_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce Makefile CI contract
        if: steps.detect.outputs.has_makefile == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.detect.outputs.has_lint }}" != "true" ]; then
            echo "Missing required make target: lint" >&2
            exit 1
          fi

          if [ "${{ steps.detect.outputs.has_test }}" != "true" ]; then
            echo "Missing required make target: test" >&2
            exit 1
          fi

          if [ "${{ steps.detect.outputs.has_build }}" != "true" ]; then
            echo "Missing required make target: build" >&2
            exit 1
          fi

      - name: Run make install
        if: steps.detect.outputs.has_install == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: make install

      - name: Run make lint
        if: steps.detect.outputs.has_makefile == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: make lint

      - name: Run make test
        if: steps.detect.outputs.has_makefile == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: make test

      - name: Run make build
        if: steps.detect.outputs.has_makefile == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: make build

      - name: Deploy pb_hooks via FTP
        if: steps.detect.outputs.has_pb_hooks == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_hooks/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_hooks/
          state-name: .ftp-deploy-state-pb_hooks-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Deploy pb_migrations via FTP
        if: steps.detect.outputs.has_pb_migrations == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_migrations/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_migrations/
          state-name: .ftp-deploy-state-pb_migrations-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Deploy pb_public via FTP using tenant directory
        id: deploy_pb_public_tenant
        if: steps.detect.outputs.has_pb_public == 'true' && env.POCKETHOST_TENANT_ID != ''
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_public/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_public/
          state-name: .ftp-deploy-state-pb_public-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Deploy pb_public via FTP using instance root fallback
        id: deploy_pb_public_root
        if: steps.detect.outputs.has_pb_public == 'true' && (steps.deploy_pb_public_tenant.outcome == 'failure' || steps.deploy_pb_public_tenant.outcome == 'skipped')
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_public/
          server-dir: pb_public/
          state-name: .ftp-deploy-state-pb_public-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Fail when pb_public deployment paths were rejected
        if: steps.detect.outputs.has_pb_public == 'true' && steps.deploy_pb_public_tenant.outcome == 'failure' && steps.deploy_pb_public_root.outcome == 'failure'
        shell: bash
        run: |
          echo "pb_public deployment failed with both tenant-directory and instance-root FTP paths." >&2
          exit 1

      - name: Wait for deployment to settle
        run: sleep 5

      - name: Run health check
        id: health
        if: steps.detect.outputs.has_health == 'true'
        continue-on-error: true
        working-directory: ${{ inputs.working-directory }}
        run: make health

      - name: Checkout previous commit for rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.detect.outputs.previous_sha }}"

      - name: Detect rollback repository contract
        id: rollback_detect
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail

          makefile=""
          for candidate in GNUmakefile makefile Makefile; do
            if [ -f "$candidate" ]; then
              makefile="$candidate"
              break
            fi
          done

          echo "makefile=${makefile}" >> "$GITHUB_OUTPUT"

          if [ -n "$makefile" ]; then
            targets="$(
              awk -F: '
                /^[A-Za-z0-9_.-]+:[^=]?/ {
                  print $1
                }
              ' "$makefile" | sort -u
            )"

            echo "has_makefile=true" >> "$GITHUB_OUTPUT"

            for target in install build; do
              if printf '%s\n' "$targets" | grep -qx "$target"; then
                echo "has_${target}=true" >> "$GITHUB_OUTPUT"
              else
                echo "has_${target}=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "has_makefile=false" >> "$GITHUB_OUTPUT"
            echo "has_install=false" >> "$GITHUB_OUTPUT"
            echo "has_build=false" >> "$GITHUB_OUTPUT"
          fi

          for directory in pb_hooks pb_migrations pb_public; do
            if [ -d "$directory" ]; then
              echo "has_${directory}=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_${directory}=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Reinstall previous commit before rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_install == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: make install

      - name: Rebuild previous commit before rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_makefile == 'true'
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail

          if [ "${{ steps.rollback_detect.outputs.has_build }}" != "true" ]; then
            echo "Rollback requires a build target when a makefile is present." >&2
            exit 1
          fi

          make build

      - name: Rollback pb_hooks via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_hooks == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_hooks/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_hooks/
          state-name: .ftp-deploy-state-pb_hooks-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Rollback pb_migrations via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_migrations == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_migrations/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_migrations/
          state-name: .ftp-deploy-state-pb_migrations-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Rollback pb_public via FTP
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true' && steps.rollback_detect.outputs.has_pb_public == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_FTP_USERNAME }}
          password: ${{ secrets.POCKETHOST_FTP_PASSWORD }}
          local-dir: ${{ inputs.working-directory }}/pb_public/
          server-dir: ${{ secrets.POCKETHOST_TENANT_ID }}/pb_public/
          state-name: .ftp-deploy-state-pb_public-${{ needs.plan.outputs.branch_name }}-${{ github.job }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Fail when rollback was not possible
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha != 'true'
        shell: bash
        run: |
          echo "Health check failed, but no previous commit SHA is available for rollback." >&2
          exit 1

      - name: Mark deployment as failed after rollback
        if: steps.health.outcome == 'failure' && steps.detect.outputs.has_previous_sha == 'true'
        shell: bash
        run: |
          echo "Health check failed. Previous commit was redeployed." >&2
          exit 1

      - name: Deployment complete
        if: steps.health.outcome != 'failure'
        run: |
          echo "Deployment completed successfully."
          echo "Instance: https://${{ secrets.POCKETHOST_TENANT_ID }}.pockethost.io"
